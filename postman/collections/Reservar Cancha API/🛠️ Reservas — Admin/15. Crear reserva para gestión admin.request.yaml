$kind: http-request
description: Crea una reserva fresca en c2 para probar las acciones de admin
  (PATCH). Actualiza la variable reserva_id.
url: "{{base_url}}/reservas"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "cancha_id": "c2",
      "nombre_equipo": "FC Deportivo",
      "telefono_contacto": "555000111",
      "fecha": "2026-12-20",
      "hora_inicio": "10:00",
      "duracion_horas": 2
    }
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 201) {
          const body = pm.response.json();
          pm.collectionVariables.set('reserva_id', body.id);
          console.log('✅ reserva_id actualizado:', body.id);
      }
    language: text/javascript
order: 4000
