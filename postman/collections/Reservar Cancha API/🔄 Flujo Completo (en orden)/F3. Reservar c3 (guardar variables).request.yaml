$kind: http-request
url: "{{base_url}}/reservas"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "cancha_id": "c3",
      "nombre_equipo": "Veloces FC",
      "telefono_contacto": "912345678",
      "fecha": "2026-11-10",
      "hora_inicio": "08:00",
      "duracion_horas": 1
    }
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 201) {
          const body = pm.response.json();
          pm.collectionVariables.set('reserva_id', body.id);
          pm.collectionVariables.set('codigo_reserva', body.codigo_reserva);
          console.log('ID:', body.id);
          console.log('Código:', body.codigo_reserva);
      }
    language: text/javascript
order: 3000
